<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AC_06 - Moderación</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="min-h-screen bg-zinc-100 text-zinc-900">
        <main class="mx-auto w-full max-w-3xl px-4 py-8">
            <header class="mb-6">
                <h1 class="text-2xl font-bold">Palabras Prohibidas</h1>
                <a
                    href="/"
                    class="text-sm text-zinc-500 underline hover:text-zinc-700"
                    >&larr; Volver al feed</a
                >
            </header>

            <section class="mb-8 rounded border border-zinc-300 bg-white p-4">
                <h2 class="mb-3 text-lg font-semibold">Agregar Palabra</h2>
                <form id="add-word-form" class="flex gap-2">
                    <input
                        id="word-input"
                        required
                        class="w-full rounded border border-zinc-300 px-3 py-2 text-sm outline-none focus:border-zinc-700"
                        placeholder="Palabra a bloquear"
                    />
                    <select
                        id="category-input"
                        class="rounded border border-zinc-300 bg-white px-3 py-2 text-sm outline-none focus:border-zinc-700"
                    >
                        <option value="INSULTS">Insultos</option>
                        <option value="SPAM">Spam</option>
                        <option value="VIOLENCE">Violencia</option>
                        <option value="CLICKBAIT">Clickbait</option>
                    </select>
                    <button
                        class="rounded border border-zinc-900 bg-zinc-900 px-4 py-2 text-sm font-medium text-white hover:bg-zinc-800"
                        type="submit"
                    >
                        Agregar
                    </button>
                </form>
            </section>

            <section class="rounded border border-zinc-300 bg-white">
                <h2
                    class="border-b border-zinc-200 px-4 py-3 text-lg font-semibold"
                >
                    Lista de Palabras
                </h2>
                <div id="word-list" class="divide-y divide-zinc-200">
                    <p class="px-4 py-6 text-center text-sm text-zinc-500">
                        Cargando...
                    </p>
                </div>
            </section>
        </main>

        <script type="module" src="/admin.js"></script>
    </body>
</html>
